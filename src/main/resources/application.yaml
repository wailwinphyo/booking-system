spring:
    application:
        name: booking-system
    main:
        allow-circular-references: true
    datasource:
        url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/booking_db
        username: ${DB_USERNAME:user}
        password: ${DB_PASSWORD:password}
        driver-class-name: org.postgresql.Driver
        hikari:
            maximum-pool-size: 10
            minimum-idle: 5
            idle-timeout: 30000
            connection-timeout: 20000

    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true
        properties:
            hibernate:
                jdbc:
                    '[time_zone]': UTC

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: 6379
    cache:
        type: redis
    jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        time-zone: UTC
        serialization:
            '[WRITE_DATES_AS_TIMESTAMPS]': false

app:
  jwt:
    secret: RobnInl9bsW+O1PHo/L31lZYotOOyttoGGx/xxKK8Jc=
    expiration: 86_400_000

